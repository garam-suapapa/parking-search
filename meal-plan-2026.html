<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 제철 저녁 식단표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#F8FAFC;color:#111827;min-height:100vh;}

/* HEADER */
#header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #F3F4F6;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:900px;margin:0 auto;padding:0 20px;height:60px;}
.header-logo{font-size:16px;font-weight:700;color:#111827;}
.header-nav{display:flex;align-items:center;gap:12px;}
.nav-btn{width:36px;height:36px;border:none;background:#F9FAFB;border-radius:50%;font-size:20px;color:#374151;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.nav-btn:hover{background:#F3F4F6;}
.nav-btn:disabled{opacity:.3;cursor:default;}
#month-label{font-size:19px;font-weight:800;color:#111827;min-width:130px;text-align:center;}
.today-btn{font-size:13px;font-weight:600;color:#22C55E;border:1.5px solid #22C55E;background:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .15s;}
.today-btn:hover{background:#F0FDF4;}

/* CONTAINER */
.container{max-width:900px;margin:0 auto;padding:20px 16px 40px;}

/* SEASONAL BANNER */
.seasonal-banner{background:#F0FDF4;border-radius:16px;padding:16px 20px;margin-bottom:16px;border-left:4px solid #22C55E;}
.seasonal-title{font-size:12px;font-weight:600;color:#15803D;margin-bottom:10px;letter-spacing:.5px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #BBF7D0;border-radius:20px;padding:6px 13px;font-size:13px;font-weight:600;color:#15803D;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:transform .15s,box-shadow .15s;cursor:default;}
.chip:hover{transform:scale(1.05);box-shadow:0 3px 8px rgba(34,197,94,.18);}
.chip-emoji{font-size:15px;}

/* LEGEND */
.legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#6B7280;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.ld-s{background:#22C55E;}
.ld-e{background:#F59E0B;}
.ld-sp{background:#8B5CF6;}

/* CALENDAR */
.cal-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.cal-head-row{display:grid;grid-template-columns:repeat(7,1fr);background:#F9FAFB;border-bottom:1px solid #F3F4F6;}
.cal-head-cell{padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:#9CA3AF;}
.cal-head-cell.weekend{color:#D1D5DB;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:90px;padding:10px 8px 8px;border-right:1px solid #F3F4F6;border-bottom:1px solid #F3F4F6;position:relative;transition:all .15s;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.empty,.cal-cell.weekend{background:#FAFBFC;cursor:default;}
.cal-cell.weekend .cal-date{color:#D1D5DB;}
.cal-cell.has-meal{cursor:pointer;}
.cal-cell.has-meal:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1);z-index:10;border-radius:8px;}

/* type borders */
.cal-cell.type-s{border-left:3px solid #22C55E;}
.cal-cell.type-e{border-left:3px solid #F59E0B;}
.cal-cell.type-sp{border-left:3px solid #8B5CF6;}

.cal-date{font-size:12px;font-weight:500;color:#9CA3AF;display:block;margin-bottom:5px;}
.cal-menu{font-size:13px;font-weight:700;color:#1A1A1A;line-height:1.4;display:block;margin-bottom:6px;word-break:keep-all;}
.cal-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;}
.badge-s{background:#DCFCE7;color:#15803D;}
.badge-e{background:#FEF3C7;color:#92400E;}
.badge-sp{background:#EDE9FE;color:#5B21B6;}

.cal-note{font-size:11px;color:#9CA3AF;margin-top:4px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* recipe hint */
.recipe-hint{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;font-size:11px;font-weight:500;padding:5px 10px;border-radius:6px;white-space:nowrap;z-index:20;pointer-events:none;}
.recipe-hint::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1A1A1A;}
.cal-cell.has-meal:hover .recipe-hint{display:block;}

/* today */
.cal-cell.today{background:#F0FDF4;}
.cal-cell.today .cal-date{color:#15803D;font-weight:800;font-size:14px;}

/* empty state */
.no-meal{font-size:12px;color:#D1D5DB;text-align:center;margin-top:16px;}

@media(max-width:430px){
  /* Header */
  .header-inner{padding:0 10px;height:50px;}
  .header-logo{font-size:12px;}
  #month-label{font-size:14px;min-width:88px;}
  .nav-btn{width:28px;height:28px;font-size:15px;}
  .today-btn{font-size:11px;padding:4px 9px;}

  /* Container */
  .container{padding:10px 8px 40px;}

  /* Seasonal banner */
  .seasonal-banner{padding:10px 12px;margin-bottom:10px;border-radius:12px;}
  .seasonal-title{font-size:11px;margin-bottom:7px;}
  .chips{gap:5px;}
  .chip{font-size:10px;padding:4px 7px;border-radius:14px;}
  .chip-emoji{font-size:12px;}

  /* Legend */
  .legend{gap:8px;margin-bottom:10px;}
  .legend-item{font-size:10px;}
  .legend-dot{width:8px;height:8px;}

  /* Calendar header */
  .cal-head-cell{padding:6px 1px;font-size:10px;}

  /* Calendar grid — fixed row height for uniform cells */
  .cal-grid{grid-auto-rows:68px;}
  .cal-cell{
    min-height:unset;
    height:68px;
    padding:4px 3px 3px;
    overflow:hidden;
  }
  .cal-date{font-size:10px;margin-bottom:2px;}
  .cal-menu{
    font-size:9.5px;
    font-weight:600;
    line-height:1.25;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
    margin-bottom:0;
  }
  .cal-badge{display:none;}
  .recipe-hint{display:none!important;}

  /* type border thinner on mobile */
  .cal-cell.type-s,.cal-cell.type-e,.cal-cell.type-sp{border-left-width:2px;}
}
</style>

const DAYS = ['월','화','수','목','금','토','일'];
let idx = 0;

// 오늘 날짜 확인 후 해당 월로 이동
(function initIdx(){
  const today = new Date();
  const todayKey = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');
  const found = MONTHS.findIndex(m => m.key === todayKey);
  if(found >= 0) idx = found;
})();

function navigate(dir){
  idx = Math.max(0, Math.min(MONTHS.length-1, idx+dir));
  renderMonth();
}

function goToday(){
  const today = new Date();
  const key = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');
  const found = MONTHS.findIndex(m => m.key === key);
  if(found >= 0){ idx = found; renderMonth(); }
}

function renderMonth(){
  const m = MONTHS[idx];
  document.getElementById('month-label').textContent = m.label;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === MONTHS.length-1;

  // Seasonal banner
  const banner = document.getElementById('seasonal-banner');
  banner.innerHTML = `
    <div class="seasonal-title">🌿 ${m.season}</div>
    <div class="chips">${m.chips.map(c => {
      const parts = c.split(' ');
      const emoji = parts[0];
      const name = parts.slice(1).join(' ');
      return `<span class="chip"><span class="chip-emoji">${emoji}</span>${name}</span>`;
    }).join('')}</div>`;

  // Calendar
  renderCalendar(m);
}

function renderCalendar(m){
  const {year, mo, meals} = m;
  const today = new Date();
  const todayY = today.getFullYear(), todayMo = today.getMonth()+1, todayD = today.getDate();
  const daysInMonth = new Date(year, mo, 0).getDate();
  const firstDow = new Date(year, mo-1, 1).getDay(); // 0=Sun
  const firstMon = (firstDow+6)%7; // 0=Mon

  const cal = document.getElementById('calendar');

  // Header row
  let html = '<div class="cal-head-row">';
  DAYS.forEach((d,i) => {
    html += `<div class="cal-head-cell${i>=5?' weekend':''}">${d}</div>`;
  });
  html += '</div><div class="cal-grid">';

  // Empty cells before first
  for(let i=0;i<firstMon;i++) html += '<div class="cal-cell empty"></div>';

  // Day cells
  for(let d=1;d<=daysInMonth;d++){
    const dow = (firstMon+d-1)%7; // 0=Mon
    const isWeekend = dow>=5;
    const isToday = (year===todayY && mo===todayMo && d===todayD);
    const meal = meals[d];

    if(isWeekend){
      html += `<div class="cal-cell weekend${isToday?' today':''}"><span class="cal-date">${d}</span></div>`;
    } else if(meal){
      const tc = meal.t==='s'?'type-s':meal.t==='e'?'type-e':'type-sp';
      const bc = meal.t==='s'?'badge-s':meal.t==='e'?'badge-e':'badge-sp';
      const bn = meal.t==='s'?'제철':meal.t==='e'?'간편':' 튀김·특식';
      const searchName = meal.t === 's' ? meal.m.split(' + ')[0] : meal.m;
      const q = encodeURIComponent(searchName + ' 레시피');
      html += `<div class="cal-cell has-meal ${tc}${isToday?' today':''}" data-q="${q}">
        <span class="recipe-hint">📖 네이버 레시피 보기</span>
        <span class="cal-date">${d}</span>
        <span class="cal-menu">${esc(meal.m)}</span>
        <span class="cal-badge ${bc}">${bn}</span>
      </div>`;
    } else {
      html += `<div class="cal-cell${isToday?' today':''}"><span class="cal-date">${d}</span></div>`;
    }
  }

  // Fill remaining cells to complete last row
  const total = firstMon + daysInMonth;
  const remainder = total % 7;
  if(remainder > 0){
    for(let i=remainder;i<7;i++) html += '<div class="cal-cell empty"></div>';
  }

  html += '</div>';
  cal.innerHTML = html;

  // Click event delegation
  cal.onclick = function(e){
    const cell = e.target.closest('.has-meal');
    if(cell && cell.dataset.q){
      window.open('https://search.naver.com/search.naver?query='+cell.dataset.q, '_blank');
    }
  };
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderMonth();
