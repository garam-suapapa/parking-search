<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>모션 이펙트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }

    #video {
      position: fixed;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #fx {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #ui {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    button {
      padding: 12px 22px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 30px;
      background: rgba(0,0,0,0.4);
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active { background: rgba(255,255,255,0.2); }

    #msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      text-align: center;
      font-family: sans-serif;
      pointer-events: none;
      z-index: 10;
    }

    #sensitivity {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      z-index: 10;
    }
    #sensitivity label {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      font-family: sans-serif;
    }
    input[type=range] {
      width: 100px;
      accent-color: #ff6b6b;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="fx"></canvas>

<div id="msg">카메라 권한을 허용해주세요 📷</div>

<div id="sensitivity">
  <label>감도</label>
  <input type="range" id="thresh" min="5" max="80" value="20">
</div>

<div id="ui">
  <button id="themeBtn">🔥 불꽃</button>
  <button id="camBtn">🔄 전환</button>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const msg = document.getElementById('msg');
const threshSlider = document.getElementById('thresh');

// 처리용 캔버스 (해상도 높임 - 엣지 품질)
const proc = document.createElement('canvas');
const pctx = proc.getContext('2d', { willReadFrequently: true });
const PW = 120, PH = 90;
proc.width = PW; proc.height = PH;

let prevData = null;
let particles = [];
let facing = 'user';

// ── 테마 (색상만 - 움직임은 윤곽 모드 고정) ──────────────
const themes = [
  { name: '🔥 불꽃', colors: ['#ff4500','#ff6b35','#ffd700','#ff8c00'] },
  { name: '💎 다이아', colors: ['#00d2d3','#54a0ff','#a29bfe','#fd79a8'] },
  { name: '🌿 자연', colors: ['#00b894','#55efc4','#fdcb6e','#6c5ce7'] },
  { name: '⚡ 번개', colors: ['#ffffff','#e0f0ff','#c9e8ff','#ffeb3b'] },
  { name: '🌸 벚꽃', colors: ['#ffb3c6','#ff8fa3','#ffccd5','#ff4d6d'] },
];
let themeIdx = 0;

// ── 파티클 (윤곽 전용 - 퍼짐 최소) ────────────────────────
class Particle {
  constructor(x, y) {
    const colors = themes[themeIdx].colors;
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 1.8;
    this.vy = (Math.random() - 0.5) * 1.8;
    this.life = 0.85 + Math.random() * 0.15;
    this.decay = 0.014 + Math.random() * 0.014;
    this.r = 1.5 + Math.random() * 2.5;
    this.color = colors[Math.floor(Math.random() * colors.length)];
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.90;
    this.vy *= 0.90;
    this.life -= this.decay;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.shadowColor = this.color;
    ctx.shadowBlur = this.r * 3;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Sobel 엣지 감지 ────────────────────────────────────────
function sobelEdge(data) {
  const edge = new Float32Array(PW * PH);
  for (let y = 1; y < PH - 1; y++) {
    for (let x = 1; x < PW - 1; x++) {
      const luma = (dx, dy) => {
        const i = ((y + dy) * PW + (x + dx)) * 4;
        return data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
      };
      const gx = -luma(-1,-1) - 2*luma(-1,0) - luma(-1,1)
                + luma( 1,-1) + 2*luma( 1,0) + luma( 1,1);
      const gy = -luma(-1,-1) - 2*luma(0,-1) - luma(1,-1)
                + luma(-1, 1) + 2*luma(0, 1) + luma(1, 1);
      edge[y * PW + x] = Math.sqrt(gx*gx + gy*gy) / 255;
    }
  }
  return edge;
}

// ── 모션 감지 + 윤곽 추출 ──────────────────────────────────
function detectContour() {
  if (video.readyState < 2) return [];

  pctx.drawImage(video, 0, 0, PW, PH);
  const { data } = pctx.getImageData(0, 0, PW, PH);
  const thresh = parseInt(threshSlider.value);

  // 1. 모션 마스크
  const motion = new Uint8Array(PW * PH);
  if (prevData) {
    for (let i = 0; i < PW * PH; i++) {
      const b = i * 4;
      const diff = (Math.abs(data[b]   - prevData[b])
                  + Math.abs(data[b+1] - prevData[b+1])
                  + Math.abs(data[b+2] - prevData[b+2])) / 3;
      if (diff > thresh) motion[i] = 1;
    }
  }
  prevData = new Uint8ClampedArray(data);

  // 2. 모션 마스크 팽창 (radius=4 → 엣지가 경계 근처에 있어도 잡힘)
  const dilated = new Uint8Array(PW * PH);
  const R = 4;
  for (let y = 0; y < PH; y++) {
    for (let x = 0; x < PW; x++) {
      loop:
      for (let dy = -R; dy <= R; dy++) {
        for (let dx = -R; dx <= R; dx++) {
          const ny = y + dy, nx = x + dx;
          if (ny >= 0 && ny < PH && nx >= 0 && nx < PW && motion[ny*PW+nx]) {
            dilated[y*PW+x] = 1;
            break loop;
          }
        }
      }
    }
  }

  // 3. Sobel 엣지 + 팽창 영역 교집합
  const edge = sobelEdge(data);
  const EDGE_THRESH = 0.22;
  const points = [];

  for (let i = 0; i < PW * PH; i++) {
    if (!dilated[i] || edge[i] < EDGE_THRESH) continue;
    const rawX = (i % PW) / PW;
    const py   = Math.floor(i / PW) / PH;
    const px   = (facing === 'user') ? (1 - rawX) : rawX;
    points.push({ px, py });
  }

  return points;
}

// ── 메인 루프 ──────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);

  const W = canvas.width, H = canvas.height;

  // 잔상 (느리게 지워서 윤곽이 빛나 보임)
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.fillRect(0, 0, W, H);

  // 윤곽 → 파티클 생성
  const points = detectContour();
  for (const { px, py } of points) {
    if (Math.random() > 0.35) continue;
    particles.push(new Particle(px * W, py * H));
  }

  if (particles.length > 1800) particles = particles.slice(-1400);

  particles = particles.filter(p => p.life > 0);
  for (const p of particles) { p.update(); p.draw(); }
}

// ── 카메라 시작 ────────────────────────────────────────────
async function startCamera() {
  try {
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false,
    });
    video.srcObject = stream;
    msg.style.display = 'none';
    prevData = null;
  } catch (e) {
    msg.textContent = '카메라를 사용할 수 없어요 😢\n' + e.message;
  }
}

// ── UI ─────────────────────────────────────────────────────
document.getElementById('themeBtn').addEventListener('click', () => {
  themeIdx = (themeIdx + 1) % themes.length;
  document.getElementById('themeBtn').textContent = themes[themeIdx].name;
  particles = [];
});

document.getElementById('camBtn').addEventListener('click', () => {
  facing = (facing === 'user') ? 'environment' : 'user';
  startCamera();
});

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

startCamera();
loop();
</script>
</body>
</html>
