<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>주차장 검색</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=584d657c06ebfe9ff9289ce5aba06701&libraries=services&autoload=false"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --accent: #FEE500;
      --accent-dark: #d4b800;
      --blue: #3182f6;
      --green: #00c471;
      --red: #f03e3e;
      --text: #191919;
      --sub: #8b8b8b;
      --border: #e8e8e8;
      --shadow: 0 2px 16px rgba(0,0,0,0.10);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; }

    /* ── LAYOUT ── */
    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ── TOP BAR ── */
    #topbar {
      background: #fff;
      padding: 12px 16px env(safe-area-inset-top, 0);
      padding-top: max(env(safe-area-inset-top), 12px);
      box-shadow: 0 1px 0 var(--border);
      z-index: 100;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: var(--text); }

    .search-row { display: flex; gap: 8px; }
    #inp-addr {
      flex: 1; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 15px; color: var(--text);
      outline: none; transition: border-color .2s; background: var(--bg);
    }
    #inp-addr:focus { border-color: var(--blue); background: #fff; }
    #btn-search {
      padding: 11px 18px; background: var(--blue); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background .15s;
    }
    #btn-search:active { background: #1a6fe0; }

    .radius-row {
      display: flex; align-items: center; gap: 8px; margin-top: 10px;
    }
    .radius-row label { font-size: 13px; color: var(--sub); }
    .radius-row select {
      padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13px; background: var(--bg); color: var(--text);
      outline: none; cursor: pointer;
    }
    #loc-btn {
      margin-left: auto; padding: 5px 12px; background: none;
      border: 1.5px solid var(--blue); border-radius: 8px;
      color: var(--blue); font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    #loc-btn:active { background: #e8f0fe; }

    /* ── MAP ── */
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── BOTTOM SHEET ── */
    #sheet {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #fff;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      z-index: 50;
      max-height: 55%;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      transform: translateY(calc(100% - 60px));
      display: flex; flex-direction: column;
    }
    #sheet.open { transform: translateY(0); }

    #sheet-handle {
      padding: 10px 0 0; display: flex; flex-direction: column;
      align-items: center; cursor: pointer; flex-shrink: 0;
    }
    .handle-bar {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin-bottom: 10px;
    }
    #sheet-title {
      width: 100%; padding: 0 16px 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    #sheet-title h2 { font-size: 16px; font-weight: 700; }
    #sheet-title span { font-size: 13px; color: var(--sub); }

    #list { overflow-y: auto; flex: 1; padding: 0 12px 32px; }

    /* ── LIST ITEM ── */
    .p-item {
      padding: 13px 12px; border-radius: var(--radius);
      margin-bottom: 6px; background: #fff;
      border: 1.5px solid var(--border);
      cursor: pointer; transition: all .15s;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .p-item:active, .p-item.active { border-color: var(--blue); background: #f0f7ff; }
    .p-num {
      width: 28px; height: 28px; background: var(--blue); color: #fff;
      border-radius: 50%; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .p-info { flex: 1; min-width: 0; }
    .p-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .p-addr { font-size: 12px; color: var(--sub); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-meta { display: flex; gap: 8px; margin-top: 6px; }
    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600;
    }
    .tag-dist { background: #e8f0fe; color: var(--blue); }
    .tag-phone { background: #e8faf0; color: var(--green); }

    /* ── EMPTY / LOADING ── */
    #sheet-empty {
      text-align: center; padding: 32px 0; color: var(--sub);
      display: none;
    }
    #sheet-empty .icon { font-size: 40px; }
    #sheet-empty p { margin-top: 8px; font-size: 14px; }

    /* ── FAB ── */
    #fab-wrap {
      position: absolute; right: 16px; bottom: 70px;
      display: flex; flex-direction: column; gap: 10px; z-index: 60;
    }
    .fab {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      box-shadow: var(--shadow); cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .fab:active { transform: scale(.9); }
    #fab-gps { background: #fff; }
    #fab-fit { background: #fff; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(25,25,25,.88); color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; z-index: 999;
      opacity: 0; transition: opacity .3s; pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── CUSTOM MARKER ── */
    .cmarker {
      background: var(--blue); color: #fff; font-size: 11px; font-weight: 700;
      padding: 4px 8px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,.2);
      white-space: nowrap; position: relative;
    }
    .cmarker::after {
      content: ''; position: absolute; bottom: -5px; left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent; border-top-color: var(--blue);
      border-bottom: none;
    }
    .dest-marker {
      background: var(--red); color: #fff; font-size: 13px; font-weight: 700;
      padding: 6px 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .dest-marker::after {
      content: ''; position: absolute; bottom: -6px; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent; border-top-color: var(--red);
      border-bottom: none;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <h1>🅿️ 주차장 검색</h1>
    <div class="search-row">
      <input type="text" id="inp-addr" placeholder="도착지 주소 또는 장소명 입력" />
      <button id="btn-search" onclick="searchDest()">검색</button>
    </div>
    <div class="radius-row">
      <label>반경</label>
      <select id="sel-radius">
        <option value="300">300m</option>
        <option value="500" selected>500m</option>
        <option value="1000">1km</option>
        <option value="2000">2km</option>
      </select>
      <button id="loc-btn" onclick="useMyLocation()">📍 내 위치</button>
    </div>
  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <div id="map"></div>

    <!-- FAB -->
    <div id="fab-wrap">
      <button class="fab" id="fab-gps" onclick="useMyLocation()" title="내 위치">📍</button>
      <button class="fab" id="fab-fit" onclick="fitBounds()" title="전체 보기">🗺️</button>
    </div>

    <!-- BOTTOM SHEET -->
    <div id="sheet">
      <div id="sheet-handle" onclick="toggleSheet()">
        <div class="handle-bar"></div>
        <div id="sheet-title">
          <h2 id="sheet-heading">주변 주차장</h2>
          <span id="sheet-count"></span>
        </div>
      </div>
      <div id="sheet-empty">
        <div class="icon">🅿️</div>
        <p>도착지를 검색하면<br>주변 주차장이 표시됩니다</p>
      </div>
      <div id="list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let map, geocoder, places;
let destMarker   = null;
let parkMarkers  = [];
let infoWindows  = [];
let destCoords   = null;
let sheetOpen    = false;
let allBounds    = null;
let toastTimer   = null;

window.addEventListener('load', function() {
  if (typeof kakao === 'undefined') {
    alert('카카오 지도 SDK를 불러오지 못했습니다.\n인터넷 연결을 확인하거나 localhost:8000 도메인이 카카오 앱에 등록되어 있는지 확인하세요.');
    return;
  }
  kakao.maps.load(function() {
    // ── MAP INIT ──────────────────────────────────────────────────────────────
    map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(37.5665, 126.9780),
      level: 4
    });
    map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

    geocoder = new kakao.maps.services.Geocoder();
    places   = new kakao.maps.services.Places();

    document.getElementById('sheet-empty').style.display = 'block';
  });
});

// ── SEARCH DESTINATION ────────────────────────────────────────────────────
function searchDest() {
  const q = document.getElementById('inp-addr').value.trim();
  if (!q) return showToast('주소 또는 장소명을 입력해주세요');

  showToast('검색 중...');

  // Try keyword search first (place name)
  places.keywordSearch(q, (result, status) => {
    if (status === kakao.maps.services.Status.OK && result.length) {
      const r = result[0];
      setDest(new kakao.maps.LatLng(r.y, r.x), r.place_name || q);
    } else {
      // Fallback to address search
      geocoder.addressSearch(q, (result, status) => {
        if (status === kakao.maps.services.Status.OK) {
          setDest(new kakao.maps.LatLng(result[0].y, result[0].x), q);
        } else {
          showToast('장소를 찾을 수 없습니다');
        }
      });
    }
  });
}

function setDest(coords, label) {
  destCoords = coords;
  clearMarkers();

  // Destination marker
  const el = document.createElement('div');
  el.className = 'dest-marker';
  el.textContent = '📍 ' + label;
  destMarker = new kakao.maps.CustomOverlay({
    position: coords, content: el, yAnchor: 1.4
  });
  destMarker.setMap(map);
  map.setCenter(coords);
  map.setLevel(4);

  searchParking(coords);
}

// ── SEARCH PARKING ────────────────────────────────────────────────────────
function searchParking(coords) {
  const radius = parseInt(document.getElementById('sel-radius').value);
  document.getElementById('sheet-heading').textContent = `반경 ${radius >= 1000 ? radius/1000+'km' : radius+'m'} 주차장`;
  document.getElementById('sheet-count').textContent = '검색 중...';
  document.getElementById('list').innerHTML = '';
  document.getElementById('sheet-empty').style.display = 'none';

  places.categorySearch('PK6', (result, status) => {
    if (status === kakao.maps.services.Status.OK) {
      renderParking(result, coords);
    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
      document.getElementById('sheet-count').textContent = '결과 없음';
      document.getElementById('sheet-empty').style.display = 'block';
      document.getElementById('sheet-empty').querySelector('p').textContent = '주변에 주차장이 없습니다\n반경을 넓혀보세요';
      showToast('주변에 주차장이 없습니다');
    } else {
      showToast('검색 중 오류가 발생했습니다');
    }
    openSheet();
  }, { location: coords, radius, sort: kakao.maps.services.SortBy.DISTANCE });
}

// ── RENDER PARKING ────────────────────────────────────────────────────────
function renderParking(result, destCoords) {
  clearParkMarkers();
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('sheet-count').textContent = `${result.length}개`;

  allBounds = new kakao.maps.LatLngBounds();
  allBounds.extend(destCoords);

  result.forEach((p, i) => {
    const coords = new kakao.maps.LatLng(p.y, p.x);
    allBounds.extend(coords);

    // Custom overlay marker
    const el = document.createElement('div');
    el.className = 'cmarker';
    el.textContent = i + 1;
    const overlay = new kakao.maps.CustomOverlay({
      position: coords, content: el, yAnchor: 1.8
    });
    overlay.setMap(map);
    parkMarkers.push(overlay);

    // Info window
    const iw = new kakao.maps.InfoWindow({
      content: `<div style="padding:8px 12px;font-size:13px;font-weight:600;min-width:140px;max-width:200px;word-break:break-word">${p.place_name}</div>`,
      removable: true
    });
    infoWindows.push(iw);

    // Click marker → open infoWindow + highlight list
    el.addEventListener('click', () => {
      closeAllInfoWindows();
      iw.open(map, new kakao.maps.Marker({ position: coords }));
      highlightItem(i);
      scrollToItem(i);
    });

    // List item
    const dist = p.distance ? formatDist(p.distance) : '';
    const item = document.createElement('div');
    item.className = 'p-item';
    item.id = `pitem-${i}`;
    item.innerHTML = `
      <div class="p-num">${i + 1}</div>
      <div class="p-info">
        <div class="p-name">${esc(p.place_name)}</div>
        <div class="p-addr">${esc(p.road_address_name || p.address_name)}</div>
        <div class="p-meta">
          ${dist ? `<span class="tag tag-dist">📍 ${dist}</span>` : ''}
          ${p.phone ? `<span class="tag tag-phone">📞 ${esc(p.phone)}</span>` : ''}
        </div>
      </div>`;
    item.addEventListener('click', () => {
      map.setCenter(coords);
      map.setLevel(3);
      closeAllInfoWindows();
      iw.open(map, new kakao.maps.Marker({ position: coords }));
      highlightItem(i);
      closeSheet();
    });
    list.appendChild(item);
  });

  showToast(`주차장 ${result.length}개 발견!`);
}

// ── MY LOCATION ───────────────────────────────────────────────────────────
function useMyLocation() {
  if (!navigator.geolocation) return showToast('위치 정보를 지원하지 않는 브라우저입니다');
  showToast('위치 확인 중...');
  navigator.geolocation.getCurrentPosition(pos => {
    const coords = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    document.getElementById('inp-addr').value = '현재 위치';
    setDest(coords, '현재 위치');
  }, () => showToast('위치 권한을 허용해주세요'));
}

// ── FIT BOUNDS ────────────────────────────────────────────────────────────
function fitBounds() {
  if (!allBounds) return showToast('먼저 검색해주세요');
  map.setBounds(allBounds);
}

// ── SHEET ─────────────────────────────────────────────────────────────────
function toggleSheet() {
  sheetOpen = !sheetOpen;
  document.getElementById('sheet').classList.toggle('open', sheetOpen);
}
function openSheet()  { sheetOpen = true;  document.getElementById('sheet').classList.add('open'); }
function closeSheet() { sheetOpen = false; document.getElementById('sheet').classList.remove('open'); }

// ── UTILS ─────────────────────────────────────────────────────────────────
function clearMarkers() {
  if (destMarker) { destMarker.setMap(null); destMarker = null; }
  clearParkMarkers();
}
function clearParkMarkers() {
  parkMarkers.forEach(m => m.setMap(null));
  parkMarkers = [];
  infoWindows = [];
}
function closeAllInfoWindows() { infoWindows.forEach(iw => iw.close()); }

function highlightItem(idx) {
  document.querySelectorAll('.p-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}
function scrollToItem(idx) {
  const el = document.getElementById(`pitem-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function formatDist(m) {
  return m >= 1000 ? (m / 1000).toFixed(1) + 'km' : m + 'm';
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Enter key search
document.getElementById('inp-addr').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchDest();
});

// Radius change re-search
document.getElementById('sel-radius').addEventListener('change', () => {
  if (destCoords) searchParking(destCoords);
});
</script>
</body>
</html>
