<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Honkai: Star Rail - Battle Screen Mockup</title>
<style>
/* ============================================================
   CSS 변수 & 리셋
   ============================================================ */
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-panel: rgba(10, 15, 35, 0.88);
  --bg-card: rgba(15, 22, 50, 0.92);

  --gold-primary: #d4a853;
  --gold-light: #f0d890;
  --gold-dim: rgba(212, 168, 83, 0.3);
  --gold-glow: rgba(212, 168, 83, 0.5);

  --element-fire: #e74c3c;
  --element-ice: #5dade2;
  --element-lightning: #a855f7;
  --element-wind: #2ecc71;
  --element-quantum: #6366f1;
  --element-imaginary: #eab308;
  --element-physical: #94a3b8;

  --hp-green: #4ade80;
  --hp-red: #ef4444;
  --break-amber: #f59e0b;
  --sp-star: #f0d060;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-gold: #d4a853;

  --border-gold: 1px solid rgba(212, 168, 83, 0.6);
  --border-dim: 1px solid rgba(212, 168, 83, 0.2);

  --screen-w: 1920px;
  --screen-h: 1080px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  width: var(--screen-w);
  height: var(--screen-h);
  overflow: hidden;
  font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* ============================================================
   배경
   ============================================================ */
#battle-screen {
  position: relative;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(30, 20, 80, 0.8) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 60%, rgba(20, 10, 60, 0.5) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 80%, rgba(10, 30, 60, 0.4) 0%, transparent 40%),
    linear-gradient(180deg, #070b18 0%, #0d1428 40%, #0a1020 100%);
}

/* 배경 별 파티클 */
#battle-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 40% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 85% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.4) 0%, transparent 100%);
  animation: starTwinkle 4s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes starTwinkle {
  0%   { opacity: 0.6; }
  100% { opacity: 1; }
}

/* 바닥 공간감 그라데이션 */
#battle-screen::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 320px;
  background: linear-gradient(0deg, rgba(5, 8, 20, 0.9) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   공통 패널 스타일
   ============================================================ */
.panel {
  background: var(--bg-panel);
  border: var(--border-gold);
  position: relative;
}

.panel::before, .panel::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  border-color: var(--gold-primary);
  border-style: solid;
}

.panel-corner::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.panel-corner::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

/* ============================================================
   상단: 행동 순서 바
   ============================================================ */
#action-order-bar {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px 8px;
  background: rgba(8, 12, 30, 0.85);
  border: var(--border-gold);
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(212, 168, 83, 0.15), inset 0 1px 0 rgba(212,168,83,0.1);
  z-index: 10;
}

#action-order-bar::before {
  content: 'ACTION ORDER';
  position: absolute;
  top: -10px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gold-primary);
  background: rgba(8, 12, 30, 0.95);
  padding: 0 8px;
  text-shadow: 0 0 8px var(--gold-glow);
}

.action-icon {
  position: relative;
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: transform 0.2s;
  flex-shrink: 0;
}

.action-icon.ally {
  background: radial-gradient(circle at 35% 35%, rgba(59,130,246,0.4), rgba(20,40,100,0.8));
  border: 2px solid #3b82f6;
  box-shadow: 0 0 8px rgba(59,130,246,0.4);
  color: #93c5fd;
}

.action-icon.enemy {
  background: radial-gradient(circle at 35% 35%, rgba(239,68,68,0.3), rgba(80,15,15,0.8));
  border: 2px solid #ef4444;
  box-shadow: 0 0 8px rgba(239,68,68,0.3);
  color: #fca5a5;
}

.action-icon.current {
  transform: scale(1.25);
  z-index: 2;
  box-shadow: 0 0 16px var(--gold-glow), 0 0 4px var(--gold-primary);
  border-color: var(--gold-primary) !important;
}

.action-icon.current::after {
  content: '▼';
  position: absolute;
  top: -18px;
  font-size: 10px;
  color: var(--gold-primary);
  animation: bounce 0.8s ease-in-out infinite alternate;
}

@keyframes bounce {
  0%   { transform: translateY(0); }
  100% { transform: translateY(-3px); }
}

.action-icon .icon-initial {
  font-size: 10px;
  text-transform: uppercase;
  line-height: 1;
  text-align: center;
}

.action-icon .icon-label {
  position: absolute;
  bottom: -18px;
  font-size: 8px;
  color: var(--text-secondary);
  white-space: nowrap;
  font-weight: 400;
}

/* 원소 색상 배지 */
.action-icon .element-dot {
  position: absolute;
  bottom: 2px; right: 2px;
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.4);
}

/* 순서 구분선 */
.order-divider {
  width: 1px;
  height: 40px;
  background: linear-gradient(180deg, transparent, rgba(212,168,83,0.3), transparent);
  flex-shrink: 0;
}

/* ============================================================
   중앙: 적 영역
   ============================================================ */
#enemy-area {
  position: absolute;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  z-index: 5;
}

.enemy-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

/* 적 이름/레벨 */
.enemy-header {
  text-align: center;
}

.enemy-name {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text-primary);
  text-shadow: 0 0 12px rgba(255,255,255,0.3);
}

.enemy-level {
  display: inline-block;
  font-size: 12px;
  color: var(--text-gold);
  background: rgba(212,168,83,0.1);
  border: 1px solid rgba(212,168,83,0.3);
  padding: 1px 8px;
  border-radius: 2px;
  margin-top: 4px;
  letter-spacing: 1px;
}

/* 적 실루엣 placeholder */
.enemy-placeholder {
  width: 220px;
  height: 300px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.enemy-body {
  width: 140px;
  height: 240px;
  background: linear-gradient(
    160deg,
    rgba(120, 40, 180, 0.25) 0%,
    rgba(60, 10, 100, 0.5) 40%,
    rgba(200, 30, 30, 0.2) 100%
  );
  clip-path: polygon(
    50% 0%, 70% 8%, 85% 20%,
    95% 40%, 90% 65%,
    75% 80%, 60% 90%,
    50% 100%, 40% 90%,
    25% 80%, 10% 65%,
    5% 40%, 15% 20%,
    30% 8%
  );
  filter: blur(1px);
  box-shadow: 0 0 40px rgba(150, 30, 200, 0.4), 0 0 80px rgba(200, 30, 30, 0.2);
  animation: enemyPulse 3s ease-in-out infinite;
}

.enemy-body::before {
  content: '';
  position: absolute;
  width: 60px; height: 60px;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(200, 160, 255, 0.5), transparent 70%);
  border-radius: 50%;
  animation: corePulse 2s ease-in-out infinite alternate;
}

.enemy-body::after {
  content: '⬡';
  position: absolute;
  font-size: 80px;
  color: rgba(200, 100, 255, 0.15);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: hexRotate 8s linear infinite;
}

@keyframes enemyPulse {
  0%, 100% { filter: blur(1px) brightness(1); }
  50% { filter: blur(0.5px) brightness(1.2); }
}

@keyframes corePulse {
  0% { opacity: 0.5; transform: translateX(-50%) scale(0.9); }
  100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
}

@keyframes hexRotate {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 적 HP 바 */
.enemy-hp-container {
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.enemy-hp-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.enemy-hp-label { color: var(--hp-red); font-weight: 600; letter-spacing: 1px; }
.enemy-hp-value { color: var(--text-primary); font-size: 13px; font-weight: 600; }

.hp-bar-outer {
  height: 10px;
  background: rgba(20, 10, 10, 0.8);
  border: var(--border-gold);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.hp-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #dc2626, #ef4444, #f87171);
  position: relative;
  transition: width 0.5s ease;
}

.hp-bar-inner::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 3px; height: 100%;
  background: rgba(255,255,255,0.6);
  border-radius: 0 2px 2px 0;
}

/* 브레이크 게이지 */
.break-container {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.break-header {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  letter-spacing: 0.5px;
}

.break-label { color: var(--break-amber); font-weight: 600; }
.break-value { color: var(--text-secondary); }

.break-bar-outer {
  height: 6px;
  background: rgba(20, 15, 5, 0.8);
  border: 1px solid rgba(245,158,11,0.4);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.break-bar-inner {
  height: 100%;
  width: 40%;
  background: linear-gradient(90deg, #b45309, #f59e0b, #fbbf24);
  position: relative;
}

.break-bar-segments {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 18px,
    rgba(0,0,0,0.5) 18px,
    rgba(0,0,0,0.5) 20px
  );
}

/* 약점 아이콘 */
.weakness-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 4px;
}

.weakness-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border: 2px solid;
  position: relative;
  cursor: default;
}

.weakness-icon.fire   { background: rgba(231,76,60,0.2);  border-color: #e74c3c; color: #e74c3c; }
.weakness-icon.lightning { background: rgba(168,85,247,0.2); border-color: #a855f7; color: #a855f7; }
.weakness-icon.wind   { background: rgba(46,204,113,0.2); border-color: #2ecc71; color: #2ecc71; }

.weakness-icon::after {
  content: attr(data-element);
  position: absolute;
  bottom: -16px;
  font-size: 8px;
  white-space: nowrap;
  color: var(--text-secondary);
}

/* ============================================================
   하단 패널 전체
   ============================================================ */
#bottom-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 220px;
  display: flex;
  align-items: flex-end;
  z-index: 10;
  pointer-events: none;
}

/* ============================================================
   하단 좌: 캐릭터 패널
   ============================================================ */
#character-panel {
  display: flex;
  gap: 8px;
  padding: 12px 16px 16px;
  background: var(--bg-panel);
  border-top: var(--border-gold);
  border-right: var(--border-gold);
  border-radius: 0 4px 0 0;
  width: auto;
  pointer-events: all;
  position: relative;
}

#character-panel::before {
  content: 'PARTY';
  position: absolute;
  top: -10px; left: 20px;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gold-primary);
  background: rgba(8, 12, 30, 0.95);
  padding: 0 6px;
}

.char-card {
  width: 120px;
  background: var(--bg-card);
  border: 1px solid rgba(212,168,83,0.2);
  border-radius: 3px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  position: relative;
  display: flex;
  flex-direction: column;
}

.char-card:hover {
  border-color: rgba(212,168,83,0.5);
  transform: translateY(-3px);
}

.char-card.active {
  border-color: var(--gold-primary);
  box-shadow: 0 0 12px var(--gold-glow), 0 -3px 0 var(--gold-primary);
  transform: translateY(-8px);
}

.char-card.active::before {
  content: '◆ TURN';
  position: absolute;
  top: 4px; left: 50%;
  transform: translateX(-50%);
  font-size: 7px;
  letter-spacing: 1.5px;
  color: var(--gold-primary);
  z-index: 5;
  text-shadow: 0 0 8px var(--gold-glow);
}

/* 초상화 */
.char-portrait {
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  position: relative;
  overflow: hidden;
}

.char-portrait::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.7;
}

.char-portrait .char-initial {
  position: relative;
  z-index: 1;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

/* 원소별 초상화 배경 */
.char-card[data-element="ice"]      .char-portrait::before { background: linear-gradient(160deg, #1a4060, #0d2840, #1e3a50); }
.char-card[data-element="wind"]     .char-portrait::before { background: linear-gradient(160deg, #0d3020, #0a2015, #1a3825); }
.char-card[data-element="fire"]     .char-portrait::before { background: linear-gradient(160deg, #3d1010, #200808, #4a1515); }
.char-card[data-element="physical"] .char-portrait::before { background: linear-gradient(160deg, #252535, #15151f, #2a2a3a); }

.char-card[data-element="ice"]      .char-portrait { color: var(--element-ice); }
.char-card[data-element="wind"]     .char-portrait { color: var(--element-wind); }
.char-card[data-element="fire"]     .char-portrait { color: var(--element-fire); }
.char-card[data-element="physical"] .char-portrait { color: var(--element-physical); }

/* 원소 배지 */
.element-badge {
  position: absolute;
  top: 4px; right: 4px;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  border: 1px solid rgba(255,255,255,0.3);
  z-index: 2;
}

.badge-ice       { background: var(--element-ice);      color: #fff; }
.badge-wind      { background: var(--element-wind);     color: #fff; }
.badge-fire      { background: var(--element-fire);     color: #fff; }
.badge-physical  { background: var(--element-physical); color: #fff; }

/* 캐릭터 정보 */
.char-info {
  padding: 6px 8px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.char-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* HP 바 (캐릭터) */
.char-hp-bar-outer {
  height: 4px;
  background: rgba(10,20,10,0.8);
  border: 1px solid rgba(74,222,128,0.2);
  border-radius: 1px;
  overflow: hidden;
}

.char-hp-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #16a34a, #4ade80);
}

.char-hp-text {
  font-size: 9px;
  color: var(--text-secondary);
  text-align: right;
}

/* ============================================================
   하단 중앙: SP 카운터
   ============================================================ */
#sp-counter {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 22px;
  gap: 6px;
  pointer-events: none;
}

#sp-counter .sp-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-gold);
  opacity: 0.8;
}

.sp-stars {
  display: flex;
  gap: 8px;
  align-items: center;
}

.sp-star {
  width: 22px; height: 22px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}

.sp-star svg {
  width: 100%; height: 100%;
}

.sp-star.filled svg .star-shape {
  fill: var(--sp-star);
  filter: drop-shadow(0 0 4px rgba(240, 208, 96, 0.7));
}

.sp-star.empty svg .star-shape {
  fill: transparent;
  stroke: rgba(212,168,83,0.4);
  stroke-width: 1.5;
}

.sp-count {
  font-size: 11px;
  color: var(--text-secondary);
}

/* ============================================================
   하단 우: 스킬 패널
   ============================================================ */
#skill-panel {
  padding: 12px 20px 16px;
  background: var(--bg-panel);
  border-top: var(--border-gold);
  border-left: var(--border-gold);
  border-radius: 4px 0 0 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
  pointer-events: all;
  position: relative;
  min-width: 380px;
}

#skill-panel::before {
  content: 'SKILLS';
  position: absolute;
  top: -10px; right: 20px;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gold-primary);
  background: rgba(8, 12, 30, 0.95);
  padding: 0 6px;
}

.skill-row {
  display: flex;
  gap: 14px;
  align-items: center;
  justify-content: flex-end;
}

/* 스킬 버튼 공통 */
.skill-btn {
  position: relative;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
  user-select: none;
  flex-direction: column;
  gap: 2px;
}

.skill-btn:hover { transform: scale(1.1); }
.skill-btn:active { transform: scale(0.95); }

.skill-btn .btn-label {
  position: absolute;
  bottom: -18px;
  font-size: 9px;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  white-space: nowrap;
  text-align: center;
}

/* 기본 공격 */
.skill-btn.basic {
  width: 58px; height: 58px;
  background: radial-gradient(circle at 40% 35%, rgba(200,200,220,0.2), rgba(80,80,100,0.6));
  border: 2px solid rgba(200,210,230,0.5);
  box-shadow: 0 0 10px rgba(200,210,230,0.2);
  font-size: 20px;
  color: rgba(200,220,255,0.9);
}

.skill-btn.basic:hover {
  box-shadow: 0 0 18px rgba(200,210,230,0.5);
}

/* 스킬 버튼 */
.skill-btn.skill {
  width: 64px; height: 64px;
  font-size: 22px;
  font-weight: 700;
  border: 2px solid;
}

.skill-btn.skill-1 {
  background: radial-gradient(circle at 40% 35%, rgba(93,173,226,0.3), rgba(20,50,100,0.7));
  border-color: rgba(93,173,226,0.7);
  box-shadow: 0 0 12px rgba(93,173,226,0.3);
  color: var(--element-ice);
}

.skill-btn.skill-2 {
  background: radial-gradient(circle at 40% 35%, rgba(46,204,113,0.3), rgba(10,50,30,0.7));
  border-color: rgba(46,204,113,0.7);
  box-shadow: 0 0 12px rgba(46,204,113,0.3);
  color: var(--element-wind);
}

.skill-btn.skill-label-sp {
  position: absolute;
  top: -10px;
  right: -2px;
  font-size: 8px;
  background: rgba(59,130,246,0.8);
  color: #fff;
  padding: 1px 4px;
  border-radius: 8px;
  font-weight: 600;
  white-space: nowrap;
}

/* 필살기 버튼 */
.skill-btn.ultimate {
  width: 90px; height: 90px;
  font-size: 28px;
  position: relative;
}

.ultimate-outer {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(
    var(--gold-primary) 0% 75%,
    rgba(212,168,83,0.15) 75% 100%
  );
  animation: ultimatePulse 2s ease-in-out infinite;
}

.ultimate-middle {
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  background: rgba(8,12,30,0.9);
  border: 2px solid rgba(93,173,226,0.6);
}

.ultimate-inner {
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(93,173,226,0.5), rgba(20,50,120,0.8));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: inset 0 0 12px rgba(93,173,226,0.3);
}

.ultimate-charge {
  position: absolute;
  top: -22px;
  right: -4px;
  font-size: 9px;
  color: var(--gold-primary);
  letter-spacing: 0.5px;
  text-shadow: 0 0 6px var(--gold-glow);
}

@keyframes ultimatePulse {
  0%, 100% {
    box-shadow: 0 0 12px var(--gold-glow), 0 0 24px rgba(212,168,83,0.2);
  }
  50% {
    box-shadow: 0 0 20px var(--gold-glow), 0 0 40px rgba(212,168,83,0.35);
  }
}

/* ============================================================
   턴 인디케이터
   ============================================================ */
#turn-indicator {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold-primary);
  text-shadow: 0 0 10px var(--gold-glow);
  z-index: 5;
  animation: fadeInOut 3s ease-in-out infinite;
}

@keyframes fadeInOut {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ============================================================
   상단 우: 정보 패널 (전투 정보)
   ============================================================ */
#battle-info {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-end;
  z-index: 10;
}

.info-badge {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text-secondary);
  background: rgba(8,12,30,0.7);
  border: var(--border-dim);
  padding: 3px 10px;
  border-radius: 2px;
}

.info-badge span { color: var(--text-gold); }

/* ============================================================
   상단 좌: 뒤로가기 / 메뉴
   ============================================================ */
#battle-menu {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.menu-btn {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text-secondary);
  background: rgba(8,12,30,0.7);
  border: var(--border-dim);
  padding: 5px 14px;
  border-radius: 2px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}

.menu-btn:hover {
  border-color: rgba(212,168,83,0.5);
  color: var(--text-primary);
}

/* ============================================================
   반응형 스케일 (브라우저 너비에 따라 축소)
   ============================================================ */
</style>
</head>
<body>

<div id="battle-screen">

  <!-- 상단 좌: 메뉴 -->
  <div id="battle-menu">
    <div class="menu-btn">≡ MENU</div>
    <div class="menu-btn">⚙ AUTO</div>
  </div>

  <!-- 상단 우: 전투 정보 -->
  <div id="battle-info">
    <div class="info-badge">WAVE <span>1 / 3</span></div>
    <div class="info-badge">TURN <span id="turn-count">4</span></div>
    <div class="info-badge">CYCLE <span>0</span></div>
  </div>

  <!-- 상단: 행동 순서 바 -->
  <div id="action-order-bar">
    <!-- JS로 렌더링 -->
  </div>

  <!-- 턴 인디케이터 -->
  <div id="turn-indicator">— MARCH 7TH'S TURN —</div>

  <!-- 중앙: 적 영역 -->
  <div id="enemy-area">
    <div class="enemy-unit">
      <div class="enemy-header">
        <div class="enemy-name">Antimatter Engine</div>
        <div class="enemy-level">Lv. 72 · Elite</div>
      </div>

      <div class="enemy-placeholder">
        <div class="enemy-body"></div>
      </div>

      <div class="enemy-hp-container">
        <div class="enemy-hp-header">
          <span class="enemy-hp-label">HP</span>
          <span class="enemy-hp-value">87,450 / 134,500</span>
        </div>
        <div class="hp-bar-outer">
          <div class="hp-bar-inner" style="width: 65%"></div>
        </div>

        <div class="break-container" style="margin-top:4px">
          <div class="break-header">
            <span class="break-label">BREAK</span>
            <span class="break-value">40 / 100</span>
          </div>
          <div class="break-bar-outer">
            <div class="break-bar-inner">
              <div class="break-bar-segments"></div>
            </div>
          </div>
        </div>

        <div class="weakness-row" style="margin-top:8px">
          <div class="weakness-icon fire" data-element="FIRE">🔥</div>
          <div class="weakness-icon lightning" data-element="LIGHTNING">⚡</div>
          <div class="weakness-icon wind" data-element="WIND">🌀</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 하단 패널 -->
  <div id="bottom-panel">

    <!-- 하단 좌: 캐릭터 패널 -->
    <div id="character-panel">
      <!-- JS로 렌더링 -->
    </div>

    <!-- 하단 중앙: SP 카운터 -->
    <div id="sp-counter">
      <div class="sp-label">SKILL POINTS</div>
      <div class="sp-stars" id="sp-stars">
        <!-- JS로 렌더링 -->
      </div>
      <div class="sp-count" id="sp-count-text">3 / 5</div>
    </div>

    <!-- 하단 우: 스킬 패널 -->
    <div id="skill-panel">
      <div class="skill-row">
        <!-- 기본 공격 -->
        <div class="skill-btn basic" id="btn-basic" title="Basic ATK">
          ⚔
          <span class="btn-label">BASIC ATK</span>
        </div>

        <!-- 스킬 1 -->
        <div class="skill-btn skill skill-1" title="Skill">
          <span class="skill-label-sp">-1 SP</span>
          ❄
          <span class="btn-label">SKILL</span>
        </div>

        <!-- 스킬 2 -->
        <div class="skill-btn skill skill-2" title="Skill">
          <span class="skill-label-sp">-1 SP</span>
          💨
          <span class="btn-label">TECH</span>
        </div>

        <!-- 필살기 -->
        <div class="skill-btn ultimate" title="Ultimate (75%)">
          <div class="ultimate-outer"></div>
          <div class="ultimate-middle"></div>
          <div class="ultimate-inner">❄</div>
          <div class="ultimate-charge">75%</div>
          <span class="btn-label" style="bottom:-22px">ULTIMATE</span>
        </div>
      </div>
    </div>

  </div><!-- /bottom-panel -->

</div><!-- /battle-screen -->

<script>
/* ============================================================
   데이터
   ============================================================ */
const battleState = {
  party: [
    { id: 'march',    name: 'March 7th', element: 'ice',      initial: 'M7', hp: 12450, maxHp: 15000, isCurrentTurn: true },
    { id: 'danheng',  name: 'Dan Heng',  element: 'wind',     initial: 'DH', hp: 8900,  maxHp: 11000, isCurrentTurn: false },
    { id: 'himeko',   name: 'Himeko',    element: 'fire',     initial: 'HI', hp: 7200,  maxHp: 9500,  isCurrentTurn: false },
    { id: 'natasha',  name: 'Natasha',   element: 'physical', initial: 'NA', hp: 10800, maxHp: 13000, isCurrentTurn: false },
  ],
  skillPoints: { current: 3, max: 5 },
  actionOrder: [
    { id: 'march',   label: 'M7',  type: 'ally',  element: 'ice',      isCurrent: true  },
    { id: 'enemy1',  label: 'E1',  type: 'enemy', element: null,       isCurrent: false },
    { id: 'danheng', label: 'DH',  type: 'ally',  element: 'wind',     isCurrent: false },
    { id: 'enemy2',  label: 'E2',  type: 'enemy', element: null,       isCurrent: false },
    { id: 'himeko',  label: 'HI',  type: 'ally',  element: 'fire',     isCurrent: false },
    { id: 'natasha', label: 'NA',  type: 'ally',  element: 'physical', isCurrent: false },
    { id: 'enemy3',  label: 'E3',  type: 'enemy', element: null,       isCurrent: false },
    { id: 'danheng2',label: 'DH',  type: 'ally',  element: 'wind',     isCurrent: false },
  ]
};

const elementColors = {
  ice: '#5dade2',
  wind: '#2ecc71',
  fire: '#e74c3c',
  physical: '#94a3b8',
  lightning: '#a855f7',
  quantum: '#6366f1',
  imaginary: '#eab308',
};

/* ============================================================
   행동 순서 바 렌더링
   ============================================================ */
function renderActionOrder() {
  const bar = document.getElementById('action-order-bar');
  bar.innerHTML = '';
  const frag = document.createDocumentFragment();

  battleState.actionOrder.forEach((icon, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'order-divider';
      frag.appendChild(div);
    }

    const el = document.createElement('div');
    el.className = `action-icon ${icon.type}${icon.isCurrent ? ' current' : ''}`;

    const initial = document.createElement('span');
    initial.className = 'icon-initial';
    initial.textContent = icon.label;
    el.appendChild(initial);

    const lbl = document.createElement('span');
    lbl.className = 'icon-label';
    lbl.textContent = icon.type === 'enemy' ? 'Enemy' : icon.label;
    el.appendChild(lbl);

    if (icon.element) {
      const dot = document.createElement('span');
      dot.className = 'element-dot';
      dot.style.background = elementColors[icon.element] || '#fff';
      el.appendChild(dot);
    }

    frag.appendChild(el);
  });

  bar.appendChild(frag);
}

/* ============================================================
   캐릭터 패널 렌더링
   ============================================================ */
function renderCharacters() {
  const panel = document.getElementById('character-panel');
  panel.innerHTML = '';

  battleState.party.forEach(char => {
    const hpPct = Math.round((char.hp / char.maxHp) * 100);
    const card = document.createElement('div');
    card.className = `char-card${char.isCurrentTurn ? ' active' : ''}`;
    card.dataset.element = char.element;
    card.dataset.id = char.id;

    // 초상화
    const portrait = document.createElement('div');
    portrait.className = 'char-portrait';

    const badge = document.createElement('div');
    badge.className = `element-badge badge-${char.element}`;
    badge.textContent = char.initial[0];
    portrait.appendChild(badge);

    const initialSpan = document.createElement('span');
    initialSpan.className = 'char-initial';
    initialSpan.textContent = char.initial;
    portrait.appendChild(initialSpan);
    card.appendChild(portrait);

    // 정보 영역
    const info = document.createElement('div');
    info.className = 'char-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'char-name';
    nameEl.textContent = char.name;
    info.appendChild(nameEl);

    const hpOuter = document.createElement('div');
    hpOuter.className = 'char-hp-bar-outer';
    const hpInner = document.createElement('div');
    hpInner.className = 'char-hp-bar-inner';
    hpInner.style.width = `${hpPct}%`;
    hpOuter.appendChild(hpInner);
    info.appendChild(hpOuter);

    const hpText = document.createElement('div');
    hpText.className = 'char-hp-text';
    hpText.textContent = `${char.hp.toLocaleString()} / ${char.maxHp.toLocaleString()}`;
    info.appendChild(hpText);

    card.appendChild(info);

    card.addEventListener('click', () => selectCharacter(char.id));
    panel.appendChild(card);
  });
}

/* ============================================================
   SP 별 렌더링
   ============================================================ */
function renderSP() {
  const container = document.getElementById('sp-stars');
  container.innerHTML = '';
  const { current, max } = battleState.skillPoints;

  for (let i = 0; i < max; i++) {
    const star = document.createElement('div');
    star.className = `sp-star ${i < current ? 'filled' : 'empty'}`;
    star.innerHTML = `<svg viewBox="0 0 24 24">
      <polygon class="star-shape"
        points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02
                12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
      />
    </svg>`;
    container.appendChild(star);
  }

  document.getElementById('sp-count-text').textContent = `${current} / ${max}`;
}

/* ============================================================
   캐릭터 선택 인터랙션
   ============================================================ */
function selectCharacter(id) {
  battleState.party = battleState.party.map(c => ({ ...c, isCurrentTurn: c.id === id }));
  renderCharacters();
  const current = battleState.party.find(c => c.isCurrentTurn);
  if (current) {
    document.getElementById('turn-indicator').textContent =
      `— ${current.name.toUpperCase()}'S TURN —`;
  }
}

/* ============================================================
   스킬 버튼 인터랙션
   ============================================================ */
function initSkillButtons() {
  const handlers = [
    { sel: '#btn-basic',    color: 'rgba(200,210,230,0.5)' },
    { sel: '.skill-btn.skill-1', color: 'rgba(93,173,226,0.6)' },
    { sel: '.skill-btn.skill-2', color: 'rgba(46,204,113,0.6)' },
    { sel: '.skill-btn.ultimate', color: 'rgba(212,168,83,0.7)' },
  ];
  handlers.forEach(({ sel, color }) => {
    const el = document.querySelector(sel);
    if (el) el.addEventListener('click', () => flashButton(el, color));
  });

  document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.addEventListener('click', () => flashButton(btn, 'rgba(212,168,83,0.3)'));
  });
}

function flashButton(el, color) {
  el.style.boxShadow = `0 0 24px ${color}`;
  setTimeout(() => { el.style.boxShadow = ''; }, 300);
}

/* ============================================================
   초기화
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  renderActionOrder();
  renderCharacters();
  renderSP();
  initSkillButtons();
});
</script>
</body>
</html>
